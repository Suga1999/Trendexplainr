            <div class="categories-grid">${categoryChips}</div>
            <h2 style="font-family:var(--font-display);margin:32px 0 16px;">🔥 Latest Trends</h2>
            <div class="articles-grid" id="articles-grid">${cards}</div>
          </div>
        `;
      }

      function renderCategory(type) {
        const items = CONTENT.filter(a => a.type === type);
        const cards = items.map(a => renderArticleCard(a)).join('');
        const cat = CATEGORIES.find(c => c.id === type);
        
        return `
          <div class="container">
            <div style="margin:100px 0 40px;">
              <span onclick="App.navigate('#/')" style="cursor:pointer;color:var(--neon-pink);">← Back to Home</span>
              <h1 style="margin:20px 0;">${cat?.emoji || '📁'} ${cat?.label || type}</h1>
              <p>${items.length} articles</p>
            </div>
            <div class="articles-grid">${cards || '<p>No articles yet.</p>'}</div>
          </div>
        `;
      }

      function renderArticle(slug) {
        const article = CONTENT.find(a => a.slug === slug);
        if (!article) return '<div class="container"><h1>Article not found</h1></div>';
        
        let contentBody = '';
        
        if (article.fullContent) {
          contentBody = article.fullContent;
        } else if (article.type === 'term') {
          contentBody = `
            <div class="content-block"><div class="content-block-label">📖 Meaning</div><div class="content-block-text"><p>${article.meaning || 'No description'}</p></div></div>
            <div class="content-block"><div class="content-block-label">📍 Origin</div><div class="content-block-text"><p>${article.origin || 'Unknown'}</p></div></div>
            <div class="content-block"><div class="content-block-label">🔥 Why It\'s Trending</div><div class="content-block-text"><p>${article.why_trending || 'Going viral now'}</p></div></div>
          `;
        } else if (article.type === 'ai') {
          contentBody = `
            <div class="content-block"><div class="content-block-label">🛠️ The Tool</div><div class="content-block-text"><p>${article.tool_or_feature || 'AI tool'}</p></div></div>
            <div class="content-block"><div class="content-block-label">⚡ What It Does</div><div class="content-block-text"><p>${article.what_it_does || 'No description'}</p></div></div>
            <div class="content-block"><div class="content-block-label">🔥 Why It Went Viral</div><div class="content-block-text"><p>${article.why_viral || 'Currently trending'}</p></div></div>
          `;
        } else {
          contentBody = `
            <div class="content-block"><div class="content-block-label">📰 Summary</div><div class="content-block-text"><p>${article.summary}</p></div></div>
          `;
        }
        
        return `
          <div class="container">
            <div style="margin:100px 0 40px;">
              <div class="article-back" onclick="App.navigate('#/')">
                <span>←</span> <span>Back to Home</span>
              </div>
              <div class="article-meta-row">
                <span class="${typeBadgeClass(article.type)}">${typeLabel(article.type)}</span>
                ${article.isTrending ? '<span class="trending-badge">🔥 Trending</span>' : ''}
                <span class="article-date">${formatDate(article.createdAt)}</span>
                <span class="article-read-time">⏱ ${article.readTime} min read</span>
                <span>${formatViews(article.views)} views</span>
              </div>
              <h1 class="article-title">${article.title}</h1>
              <p class="article-summary">${article.summary}</p>
            </div>
            <div class="article-body">
              ${contentBody}
            </div>
          </div>
        `;
      }

      function initTicker() {
        const ticker = $('#ticker-inner');
        if (ticker && TRENDING_TICKER) {
          const items = [...TRENDING_TICKER, ...TRENDING_TICKER];
          ticker.innerHTML = items.map(t => `<span class="ticker-item">${t}</span>`).join('');
        }
      }

      function initHamburger() {
        const btn = $('#hamburger-btn');
        const mobileNav = $('#mobile-nav');
        if (btn && mobileNav) {
          btn.addEventListener('click', () => {
            btn.classList.toggle('open');
            mobileNav.classList.toggle('open');
          });
        }
      }

      function route() {
        const hash = window.location.hash || '#/';
        const app = $('#app');
        if (!app) return;
        
        let html = '';
        if (hash === '#/' || hash === '') {
          html = renderHome();
        } else if (hash.startsWith('#/article/')) {
          const slug = hash.replace('#/article/', '');
          html = renderArticle(slug);
        } else if (hash.startsWith('#/category/')) {
          const type = hash.replace('#/category/', '');
          html = renderCategory(type);
        } else {
          html = '<div class="container"><h1>404 - Page not found</h1></div>';
        }
        
        app.innerHTML = html;
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function navigate(hash) { window.location.hash = hash; }
      function goToArticle(slug) { navigate(`#/article/${slug}`); }

      window.addEventListener('hashchange', route);
      
      function init() {
        initTicker();
        initHamburger();
        route();
      }
      
      return { init, navigate, goToArticle };
    })();

    // FIXED: No space in DOMContentLoaded!
    document.addEventListener('DOMContentLoaded', App.init);
  </script>
</body>
</html>
